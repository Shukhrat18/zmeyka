<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 HAND SNAKE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#060e08; color:#00ff88;
  font-family:'Orbitron',monospace;
  height:100vh; overflow:hidden;
  display:flex; flex-direction:column;
}
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px; background:rgba(0,0,0,0.6);
  border-bottom:1px solid rgba(0,255,136,0.15); flex-shrink:0;
}
.logo { font-size:1.1rem; font-weight:900; letter-spacing:4px; text-shadow:0 0 15px #00ff88; }
.stats { display:flex; gap:28px; }
.stat-v { font-size:1.1rem; color:#00e5ff; text-shadow:0 0 10px #00e5ff; }
.stat-l { font-size:0.45rem; color:rgba(0,255,136,0.4); letter-spacing:2px; margin-bottom:2px; }
.hdot { display:flex; align-items:center; gap:8px; font-size:0.65rem; color:rgba(0,255,136,0.5); }
.d { width:8px;height:8px;border-radius:50%;background:#ff2d55;box-shadow:0 0 8px #ff2d55;transition:.3s; }
.d.on { background:#00ff88;box-shadow:0 0 14px #00ff88;animation:bl 1s infinite; }
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

.workspace { flex:1; position:relative; overflow:hidden; }

/* Camera full background */
#vid {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; transform:scaleX(-1); opacity:0.2; z-index:1;
}

/* Game canvas - NO GRID, smooth */
#gc {
  position:absolute; inset:0; width:100%; height:100%; z-index:3;
}

/* Overlays */
.ov {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(6,14,8,0.93); z-index:50; gap:18px;
  backdrop-filter:blur(5px);
}
.ov.off { display:none; }
.ov-title { font-size:2rem; font-weight:900; letter-spacing:5px; text-shadow:0 0 30px currentColor; }
.guide {
  background:rgba(0,255,136,0.05); border:1px solid rgba(0,255,136,0.15);
  border-radius:14px; padding:20px 32px; text-align:center;
  font-size:.75rem; color:rgba(0,255,136,.6); letter-spacing:1px; line-height:2.2;
}
.guide .big { font-size:2.5rem; margin-bottom:8px; }
.btn {
  padding:13px 48px; border:2px solid #00ff88; background:transparent; color:#00ff88;
  font-family:'Orbitron',monospace; font-size:.9rem; font-weight:700; letter-spacing:3px; cursor:pointer; transition:.3s;
}
.btn:hover { background:#00ff88; color:#060e08; box-shadow:0 0 30px #00ff88; }
.final { font-size:1.4rem; color:#ffd60a; text-shadow:0 0 20px #ffd60a; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🐍 HAND SNAKE</div>
  <div class="stats">
    <div class="stat"><div class="stat-l">ХОЛ</div><div class="stat-v" id="sS">0</div></div>
    <div class="stat"><div class="stat-l">РЕКОРД</div><div class="stat-v" id="sH">0</div></div>
  </div>
  <div class="hdot"><div class="d" id="dot"></div><span id="dotTxt">КАМЕРА...</span></div>
</div>

<div class="workspace">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="gc"></canvas>

  <!-- START -->
  <div class="ov" id="ovS">
    <div class="ov-title" style="color:#00ff88">🐍 HAND SNAKE</div>
    <div class="guide">
      <div class="big">☝️ = 🐍</div>
      МОР ДАР НӮГ ЧИЛИК АСТ<br>
      ЧИЛИК ҲАРАКАТ КАРД → МОР ҲАРАКАТ КАРД<br>
      ЧИЛИК ИСТОД → МОР ИСТОД<br>
      ЧИЛИК ТОБ ДОД → МОР ТОБ МЕХӮРАД
    </div>
    <button class="btn" onclick="startGame()">ОҒОЗ ▶</button>
  </div>

  <!-- OVER -->
  <div class="ov off" id="ovO">
    <div class="ov-title" style="color:#ff2d55">ТАМОМ!</div>
    <div class="final" id="fS">ХОЛ: 0</div>
    <div style="color:#ffd60a;display:none" id="nR">🏆 РЕКОРДИ НАВ!</div>
    <button class="btn" style="border-color:#ff2d55;color:#ff2d55" onclick="startGame()">ДУБОРА ↺</button>
  </div>

  <!-- LOADING -->
  <div class="ov" id="ovL">
    <div class="ov-title" style="color:#00e5ff;font-size:1.3rem">БОРИШ...</div>
    <div style="font-size:.7rem;color:rgba(0,229,255,.5)">Лаҳзае сабр кунед...</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

let W, H;
function resize(){
  const ws = document.querySelector('.workspace');
  W = canvas.width = ws.clientWidth;
  H = canvas.height = ws.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ======= SNAKE STATE =======
const SEG_DIST = 12;   // distance between each segment
const SEG_RADIUS = 8;  // size of each segment
const FOOD_RADIUS = 10;
const INIT_LENGTH = 8;

let segments = [];   // [{x,y}]
let foods = [];
let score = 0, hi = 0;
let alive = false;
let fingerX = null, fingerY = null; // current fingertip position
let gameRunning = false;

function initSnake(){
  segments = [];
  const startX = W / 2;
  const startY = H / 2;
  for(let i = 0; i < INIT_LENGTH; i++){
    segments.push({ x: startX - i * SEG_DIST, y: startY });
  }
  score = 0;
  alive = true;
  fingerX = null;
  fingerY = null;
  spawnFoods();
  ui();
}

function spawnFoods(){
  foods = [];
  for(let i = 0; i < 5; i++) spawnOneFood();
}

function spawnOneFood(){
  foods.push({
    x: 40 + Math.random() * (W - 80),
    y: 40 + Math.random() * (H - 80),
    pulse: Math.random() * Math.PI * 2
  });
}

function ui(){
  document.getElementById('sS').textContent = score;
  document.getElementById('sH').textContent = hi;
}

// ======= UPDATE =======
function update(){
  if(!alive || !gameRunning) return;

  // If finger detected, move head toward finger
  if(fingerX !== null && fingerY !== null){
    const head = segments[0];
    const dx = fingerX - head.x;
    const dy = fingerY - head.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist > 2){
      // Move head toward fingertip
      const speed = Math.min(dist, 6); // max speed 6px/frame
      const nx = head.x + (dx/dist) * speed;
      const ny = head.y + (dy/dist) * speed;
      segments[0] = { x: nx, y: ny };
    }
    // If very close to finger, snap head to finger
    if(dist < 4){
      segments[0] = { x: fingerX, y: fingerY };
    }
  }
  // If no finger - snake stays still (segments don't move)

  // Update body segments to follow head
  for(let i = 1; i < segments.length; i++){
    const prev = segments[i-1];
    const curr = segments[i];
    const dx = prev.x - curr.x;
    const dy = prev.y - curr.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > SEG_DIST){
      const ratio = (dist - SEG_DIST) / dist;
      segments[i] = {
        x: curr.x + dx * ratio,
        y: curr.y + dy * ratio
      };
    }
  }

  // Check wall collision
  const head = segments[0];
  if(head.x < 0 || head.x > W || head.y < 0 || head.y > H){
    gameOver();
    return;
  }

  // Check self collision (skip first 10 segments)
  for(let i = 10; i < segments.length; i++){
    const s = segments[i];
    const dx = head.x - s.x;
    const dy = head.y - s.y;
    if(Math.sqrt(dx*dx + dy*dy) < SEG_RADIUS * 1.5){
      gameOver();
      return;
    }
  }

  // Check food
  for(let i = foods.length - 1; i >= 0; i--){
    const f = foods[i];
    const dx = head.x - f.x;
    const dy = head.y - f.y;
    if(Math.sqrt(dx*dx + dy*dy) < SEG_RADIUS + FOOD_RADIUS){
      // Eat!
      score += 10;
      if(score > hi) hi = score;
      ui();
      foods.splice(i, 1);
      spawnOneFood();
      // Grow snake - add segments at tail
      for(let g = 0; g < 5; g++){
        const tail = segments[segments.length-1];
        segments.push({...tail});
      }
    }
  }
}

// ======= DRAW =======
function draw(){
  ctx.clearRect(0, 0, W, H);

  if(!gameRunning) return;

  // Draw food
  foods.forEach(f => {
    f.pulse += 0.05;
    const r = FOOD_RADIUS * (0.8 + 0.2 * Math.sin(f.pulse));
    ctx.save();
    const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r * 2.5);
    grad.addColorStop(0, 'rgba(255,45,85,0.9)');
    grad.addColorStop(1, 'rgba(255,45,85,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(f.x, f.y, r * 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff2d55';
    ctx.shadowColor = '#ff2d55'; ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Draw snake body
  if(segments.length < 2) return;

  // Draw as smooth path
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Body glow
  for(let pass = 0; pass < 2; pass++){
    ctx.beginPath();
    ctx.moveTo(segments[0].x, segments[0].y);
    for(let i = 1; i < segments.length; i++){
      // Smooth curve through segments
      if(i < segments.length - 1){
        const mx = (segments[i].x + segments[i+1].x) / 2;
        const my = (segments[i].y + segments[i+1].y) / 2;
        ctx.quadraticCurveTo(segments[i].x, segments[i].y, mx, my);
      } else {
        ctx.lineTo(segments[i].x, segments[i].y);
      }
    }

    if(pass === 0){
      // Glow pass
      ctx.strokeStyle = 'rgba(0,255,136,0.2)';
      ctx.lineWidth = SEG_RADIUS * 2 + 6;
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 20;
    } else {
      // Main body
      const grad = ctx.createLinearGradient(
        segments[0].x, segments[0].y,
        segments[segments.length-1].x, segments[segments.length-1].y
      );
      grad.addColorStop(0, '#00ff88');
      grad.addColorStop(1, '#004422');
      ctx.strokeStyle = grad;
      ctx.lineWidth = SEG_RADIUS * 2;
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 8;
    }
    ctx.stroke();
  }

  // Draw head (circle)
  const head = segments[0];
  ctx.beginPath();
  ctx.arc(head.x, head.y, SEG_RADIUS + 2, 0, Math.PI*2);
  ctx.fillStyle = '#00ff88';
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 20;
  ctx.fill();

  // Eyes on head
  if(segments.length > 1){
    const dx = segments[0].x - segments[1].x;
    const dy = segments[0].y - segments[1].y;
    const angle = Math.atan2(dy, dx);
    const eyeR = SEG_RADIUS * 0.35;
    const eyeDist = SEG_RADIUS * 0.5;
    const ex1 = head.x + Math.cos(angle + 0.7) * eyeDist;
    const ey1 = head.y + Math.sin(angle + 0.7) * eyeDist;
    const ex2 = head.x + Math.cos(angle - 0.7) * eyeDist;
    const ey2 = head.y + Math.sin(angle - 0.7) * eyeDist;
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#001a08';
    ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI*2); ctx.fill();
    // Pupils (white dot)
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(ex1 + Math.cos(angle)*1, ey1 + Math.sin(angle)*1, eyeR*0.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2 + Math.cos(angle)*1, ey2 + Math.sin(angle)*1, eyeR*0.4, 0, Math.PI*2); ctx.fill();
  }

  // Fingertip indicator ring
  if(fingerX !== null){
    ctx.beginPath();
    ctx.arc(fingerX, fingerY, 14, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,255,136,0.5)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 10;
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function gameOver(){
  alive = false;
  gameRunning = false;
  if(score > hi) hi = score;
  ui();
  document.getElementById('fS').textContent = 'ХОЛ: ' + score;
  document.getElementById('nR').style.display = score >= hi && score > 0 ? 'block' : 'none';
  document.getElementById('ovO').classList.remove('off');
}

function startGame(){
  document.getElementById('ovS').classList.add('off');
  document.getElementById('ovO').classList.add('off');
  gameRunning = true;
  initSnake();
}

// ======= GAME LOOP =======
let lastTime = 0;
function gameLoop(ts){
  const dt = ts - lastTime;
  lastTime = ts;
  if(dt < 100){ // skip big gaps
    update();
    draw();
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// ======= MEDIAPIPE =======
async function initCam(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    document.getElementById('vid').srcObject = stream;
    await document.getElementById('vid').play();
    loadMP();
  }catch(e){
    document.getElementById('dotTxt').textContent = 'КАМЕРА ЙЎҚ';
    document.getElementById('ovL').classList.add('off');
    document.getElementById('ovS').classList.remove('off');
  }
}

function loadMP(){
  const s1 = document.createElement('script');
  s1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
  s1.crossOrigin = 'anonymous';
  s1.onload = () => {
    const s2 = document.createElement('script');
    s2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';
    s2.crossOrigin = 'anonymous';
    s2.onload = setupMP;
    s2.onerror = mpFail;
    document.head.appendChild(s2);
  };
  s1.onerror = mpFail;
  document.head.appendChild(s1);
}

function mpFail(){
  document.getElementById('dotTxt').textContent = 'КАМЕРА ЙЎҚ';
  document.getElementById('ovL').classList.add('off');
  document.getElementById('ovS').classList.remove('off');
}

function setupMP(){
  const vid = document.getElementById('vid');
  const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({
    maxNumHands:1,
    modelComplexity:0,
    minDetectionConfidence:0.65,
    minTrackingConfidence:0.65
  });

  hands.onResults(res => {
    if(res.multiHandLandmarks && res.multiHandLandmarks.length > 0){
      document.getElementById('dot').className = 'd on';
      document.getElementById('dotTxt').textContent = 'ДАСТ ✓';

      const lm = res.multiHandLandmarks[0];
      // Index fingertip = landmark 8, mirror X
      const nx = 1 - lm[8].x;
      const ny = lm[8].y;

      // Convert to screen coords
      fingerX = nx * W;
      fingerY = ny * H;
    } else {
      document.getElementById('dot').className = 'd';
      document.getElementById('dotTxt').textContent = 'ЧИЛИКРО НИШ ОН ДИҲ';
      fingerX = null;
      fingerY = null;
    }
  });

  const cam = new Camera(vid, {
    onFrame: async () => { await hands.send({image: vid}); },
    width:640, height:480
  });
  cam.start();

  document.getElementById('ovL').classList.add('off');
  document.getElementById('ovS').classList.remove('off');
}

window.addEventListener('load', () => setTimeout(initCam, 500));
</script>
</body>
</html>
